##### Spring data JPA Configuration ######
spring.datasource.driver-class-name=org.hsqldb.jdbcDriver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.url=jdbc:hsqldb:mem:apigatewaydb
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.javax.persistence.validation.mode=none
##### Spring Web Configuration ######
server.servlet.context-path=/water
server.port=8090
#### Water Configuration #####
water.testMode=false
#### Gateway Configuration #####
gateway.enabled=true
gateway.proxy.timeout=30
gateway.proxy.retries=3
gateway.proxy.connectTimeout=10
gateway.discovery.syncIntervalSeconds=30
gateway.loadbalancer.strategy=ROUND_ROBIN
gateway.circuitbreaker.failureThreshold=5
gateway.circuitbreaker.successThreshold=3
gateway.circuitbreaker.timeoutSeconds=30
gateway.circuitbreaker.windowSizeSeconds=60
gateway.ratelimit.enabled=true
gateway.ratelimit.defaultMaxRequests=100
gateway.ratelimit.defaultWindowSeconds=60
# Reserved for the future GatewayAuthenticationApi integration.
# The current proxy boundary is protected by Water REST security and does not
# read these properties; JWT auth stays fail-closed in GatewayAuthenticationServiceImpl
# until it delegates to the real Water JwtTokenService.
# gateway.security.authMethod=PASSTHROUGH
# gateway.security.jwtValidation=false
gateway.metrics.enabled=true
